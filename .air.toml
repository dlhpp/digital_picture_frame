#:schema https://json.schemastore.org/any.json

env_files = []
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/main"
  # cmd = "go build -o ./tmp/main ."
  cmd = "go run ."
  delay = 1000
  entrypoint = ["./tmp/main"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  ignore_dangerous_root_dir = false
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html", "css", "js", "json", "yaml", "yml", "txt", "ico", "png", "jpg", "jpeg", "gif", "svg"]
  include_file = []
  kill_delay = "0s"
  log = "air-build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

  [build.windows]
    args_bin = []
    bin = "tmp\\main.exe"
    cmd = "go build -o ./tmp/main.exe ."
    # cmd = "go run ."
    entrypoint = ["tmp\\main.exe"]
    full_bin = ""
    post_cmd = []
    pre_cmd = []

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = true

[proxy]
  app_port = 0
  app_start_timeout = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
